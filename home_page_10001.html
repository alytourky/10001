<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        :root { --primary: #2563eb; }
        body { background: #f3f4f6; }
        .hidden { display: none!important; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { max-height: 60px; margin-bottom: 20px; }
        .login-box h2 { margin-bottom: 8px; color: #111827; }
        .login-box .step-label { font-size: 12px; color: #6b7280; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; }
        .login-box input[readonly] { background: #f3f4f6; color: #374151; cursor: default; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
        .error { color: #dc2626; margin-top: 10px; font-size: 14px; }
        header { background: var(--primary); color: white; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; }
        header .logo { max-height: 40px; margin: 0; }
        .logout { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .user-badge { background: rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 6px; font-size: 13px; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .controls { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: end; }
        .controls .field { display: flex; flex-direction: column; gap: 5px; }
        .controls label { font-size: 13px; color: #6b7280; font-weight: 500; }
        .controls input { padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; min-width: 160px; }
        .file-count { background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; height: fit-content; }
        .reset-btn { padding: 10px 16px; background: #6b7280; color: white; border: none; border-radius: 8px; cursor: pointer; height: fit-content; }
        table { width: 100%; background: white; border-radius: 12px; overflow: hidden; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; font-weight: 600; }
        .action-btn { padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 14px; margin-right: 8px; display: inline-block; }
        .preview  { background: #3b82f6; color: white; }
        .download { background: #10b981; color: white; }
        footer { background: #111827; color: #9ca3af; text-align: center; padding: 20px; margin-top: 50px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #9ca3af; }
        .loading { text-align: center; padding: 40px; color: #6b7280; font-size: 15px; }

        /* ── Mobile Responsive ── */
        @media (max-width: 600px) {
            .login-box { padding: 28px 20px; }
            header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
            header h3 { font-size: 14px; }
            .user-badge { font-size: 11px; padding: 4px 10px; }
            .logout { font-size: 12px; padding: 6px 12px; }
            .container { padding: 0 10px; margin: 16px auto; }
            .controls { flex-direction: column; gap: 10px; padding: 14px; }
            .controls input { min-width: unset; width: 100%; }
            .controls .field { width: 100%; }
            .file-count, .reset-btn { width: 100%; text-align: center; }
            table { font-size: 13px; }
            th, td { padding: 10px 8px; }
            .action-btn { padding: 5px 8px; font-size: 12px; margin-right: 4px; }
            th:nth-child(2), td:nth-child(2) { display: none; }
        }
    </style>
</head>
<body>

<!-- ── STEP 1: Branch Login (PASSWORD mode only) ── -->
<div id="branchLoginPage" class="login-container hidden">
    <div class="login-box">
        <img id="loginLogo1" class="logo" src="" alt="Logo">
        <h2 id="loginHeader1"></h2>
        <p class="step-label">Branch Access</p>
        <input type="text"     id="branchUser" placeholder="Username">
        <input type="password" id="branchPass" placeholder="Password">
        <button class="btn" onclick="branchLogin()">Login</button>
        <div id="branchError" class="error hidden">Invalid username or password</div>
        <div id="loginFooter1" style="margin-top:25px; font-size:13px; color:#6b7280;"></div>
    </div>
</div>

<!-- ── STEP 2: End User ID (ID mode only) ── -->
<div id="euLoginPage" class="login-container hidden">
    <div class="login-box">
        <img id="loginLogo2" class="logo" src="" alt="Logo">
        <h2 id="loginHeader2"></h2>
        <p class="step-label">Enter your ID to view your files</p>
        <input type="text" id="endUserId" placeholder="" readonly>
        <button class="btn" onclick="euLogin()">Login</button>
        <div id="euError" class="error hidden">No files found for this ID</div>
        <div id="loginFooter2" style="margin-top:25px; font-size:13px; color:#6b7280;"></div>
    </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard" class="hidden">
    <header>
        <div style="display:flex; align-items:center; gap:15px;">
            <img id="dashLogo" class="logo" src="" alt="Logo">
            <h3 id="dashHeader"></h3>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <span class="user-badge">ID: <span id="currentUserId"></span></span>
            <div class="logout" onclick="logout()">Logout</div>
        </div>
    </header>
    <div class="container">
        <div class="controls">
            <div class="field">
                <label>Search File Name</label>
                <input type="text" id="searchText" placeholder="Type to filter..." oninput="filterFiles()">
            </div>
            <div class="field">
                <label>From Date</label>
                <input type="date" id="dateFrom" oninput="filterFiles()">
            </div>
            <div class="field">
                <label>To Date</label>
                <input type="date" id="dateTo" oninput="filterFiles()">
            </div>
            <button class="reset-btn" onclick="resetFilters()">Reset</button>
            <div class="file-count">Files: <span id="fileCount">0</span></div>
        </div>
        <div id="loadingMsg" class="loading hidden">Loading files...</div>
        <table id="filesTableWrapper">
            <thead>
                <tr>
                    <th>File Name</th><th>File Type</th><th>Date</th><th>Preview</th><th>Download</th>
                </tr>
            </thead>
            <tbody id="filesTable"></tbody>
        </table>
        <div id="emptyState" class="empty-state hidden">No files available yet</div>
    </div>
    <footer id="dashFooter"></footer>
</div>

<script>
const CONFIG = {
    "CLIENT_NAME": "COMMIT",
    "LOGIN_MODE": "id",
    "BRANCH_USERNAME": "",
    "BRANCH_PASSWORD": "",
    "EU_ID_HINT": "Enter your ID",
    "DRIVE_API_KEY": "AIzaSyAE2yFTE-lNNp3rN1E0DXyBhS27ri4fl1c",
    "DRIVE_FOLDER_ID": "1Hg7vucD7w5fetHJqiMVJxwAcRRIuz23d",
    "LOGO_URL": "logo_10001.png",
    "HEADER_TEXT": "Workspace Archive",
    "FOOTER_TEXT": "© 2026 All Rights Reserved",
    "PRIMARY_COLOR": "#9b021a",
    "FILES": []
}
// LOGIN_MODE:
//   "direct"   → open dashboard immediately
//   "id"       → show ID login (ID comes from QR URL, readonly)
//   "password" → show username/password login

document.documentElement.style.setProperty('--primary', CONFIG.PRIMARY_COLOR);
['loginLogo1','loginLogo2','dashLogo'].forEach(id => document.getElementById(id).src = CONFIG.LOGO_URL);
['loginHeader1','loginHeader2','dashHeader'].forEach(id => document.getElementById(id).innerText = CONFIG.HEADER_TEXT);
['loginFooter1','loginFooter2'].forEach(id => document.getElementById(id).innerText = CONFIG.FOOTER_TEXT);
document.getElementById('dashFooter').innerText = CONFIG.FOOTER_TEXT;

// Read ?user= and ?folder= from URL (QR)
const _urlParams = new URLSearchParams(window.location.search);
const _urlId     = _urlParams.get('user')   || '';
const _urlFolder = _urlParams.get('folder') || '';

// Pre-fill readonly ID field (shows user ID number, not folder ID)
if (_urlId) document.getElementById('endUserId').value = _urlId;

// ── Startup ──────────────────────────────────────────────────────────────
(function start() {
    if (CONFIG.LOGIN_MODE === 'direct') {
        showDashboard(_urlId || 'ALL');
    } else if (CONFIG.LOGIN_MODE === 'id') {
        if (_urlId) {
            // ID from QR — show ID login page with readonly field
            document.getElementById('euLoginPage').classList.remove('hidden');
        } else {
            showDashboard('ALL');
        }
    } else if (CONFIG.LOGIN_MODE === 'password') {
        document.getElementById('branchLoginPage').classList.remove('hidden');
    }
})();

// ── Branch Login ─────────────────────────────────────────────────────────
function branchLogin() {
    const user = document.getElementById('branchUser').value.trim();
    const pass = document.getElementById('branchPass').value;
    if (user === CONFIG.BRANCH_USERNAME && pass === CONFIG.BRANCH_PASSWORD) {
        document.getElementById('branchError').classList.add('hidden');
        document.getElementById('branchLoginPage').classList.add('hidden');
        showDashboard(_urlId || 'ALL');
    } else {
        document.getElementById('branchError').classList.remove('hidden');
    }
}

// ── EU Login ─────────────────────────────────────────────────────────────
function euLogin() {
    const id = document.getElementById('endUserId').value.trim();
    if (!id) return;
    document.getElementById('euLoginPage').classList.add('hidden');
    showDashboard(id);
}

// ── Dashboard ─────────────────────────────────────────────────────────────
function showDashboard(userId) {
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('currentUserId').innerText = userId === 'ALL' ? 'All' : userId;
    loadFiles(userId);
}

function logout() {
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('filesTable').innerHTML = '';
    allFiles = [];
    if (CONFIG.LOGIN_MODE === 'password') {
        document.getElementById('branchUser').value = '';
        document.getElementById('branchPass').value = '';
        document.getElementById('branchLoginPage').classList.remove('hidden');
    } else if (CONFIG.LOGIN_MODE === 'id') {
        document.getElementById('euLoginPage').classList.remove('hidden');
    } else {
        showDashboard(_urlId || 'ALL');
    }
}

// ── Load Files ────────────────────────────────────────────────────────────
function loadFiles(userId) {
    if (CONFIG.FILES && CONFIG.FILES.length > 0) { renderFiles(CONFIG.FILES); return; }
    if (!CONFIG.DRIVE_API_KEY || !CONFIG.DRIVE_FOLDER_ID) {
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('emptyState').innerText = 'Drive not configured';
        return;
    }
    document.getElementById('loadingMsg').classList.remove('hidden');
    document.getElementById('filesTableWrapper').style.display = 'none';
    const parentId = CONFIG.DRIVE_FOLDER_ID;
    const apiKey   = CONFIG.DRIVE_API_KEY;
    // Use folder from URL param, fallback to CONFIG folder
    const folderId = _urlFolder || parentId;
    fetchFilesFromFolder(folderId, apiKey);
}

function fetchFilesFromFolder(folderId, apiKey) {
    const q = encodeURIComponent(`'${folderId}' in parents and trashed=false`);
    fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,mimeType,createdTime,webViewLink,webContentLink)&orderBy=createdTime desc&key=${apiKey}`)
        .then(r => r.json())
        .then(data => {
            document.getElementById('loadingMsg').classList.add('hidden');
            document.getElementById('filesTableWrapper').style.display = '';
            const files = (data.files || []).map(f => ({
                name: f.name, date: f.createdTime ? f.createdTime.split('T')[0] : '',
                type: mimeLabel(f.mimeType), preview: f.webViewLink || '#',
                download: f.webContentLink || f.webViewLink || '#'
            }));
            renderFiles(files);
        })
        .catch(() => showDriveError());
}

function mimeLabel(mime) {
    if (!mime) return '—';
    if (mime.includes('pdf')) return 'PDF';
    if (mime.includes('image')) return 'Image';
    if (mime.includes('spreadsheet') || mime.includes('excel')) return 'Excel';
    if (mime.includes('document') || mime.includes('word')) return 'Word';
    if (mime.includes('folder')) return 'Folder';
    return mime.split('/').pop().toUpperCase();
}

function showDriveError() {
    document.getElementById('loadingMsg').classList.add('hidden');
    document.getElementById('emptyState').classList.remove('hidden');
    document.getElementById('emptyState').innerText = 'Could not load files from Drive';
}

let allFiles = [];
function renderFiles(files) {
    allFiles = files;
    const tbody = document.getElementById('filesTable');
    tbody.innerHTML = '';
    if (files.length === 0) {
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('fileCount').innerText = 0;
        return;
    }
    document.getElementById('emptyState').classList.add('hidden');
    files.forEach(file => {
        tbody.innerHTML += `<tr data-date="${file.date}" data-name="${file.name.toLowerCase()}">
            <td>${file.name}</td><td>${file.type||'—'}</td><td>${file.date}</td>
            <td><a href="${file.preview}" class="action-btn preview" target="_blank">View</a></td>
            <td><a href="${file.download}" class="action-btn download" target="_blank">Download</a></td>
        </tr>`;
    });
    document.getElementById('fileCount').innerText = files.length;
}

function filterFiles() {
    const text = document.getElementById('searchText').value.toLowerCase();
    const dateFrom = document.getElementById('dateFrom').value;
    const dateTo = document.getElementById('dateTo').value;
    let count = 0;
    document.querySelectorAll('#filesTable tr').forEach(row => {
        const name = row.getAttribute('data-name') || '';
        const fileDate = row.getAttribute('data-date') || '';
        const ok = (!text || name.includes(text)) && (!dateFrom || fileDate >= dateFrom) && (!dateTo || fileDate <= dateTo);
        row.style.display = ok ? '' : 'none';
        if (ok) count++;
    });
    document.getElementById('fileCount').innerText = count;
    const empty = document.getElementById('emptyState');
    if (allFiles.length === 0) { empty.innerText = 'No files available yet'; empty.classList.remove('hidden'); }
    else if (count === 0) { empty.innerText = 'No files match your filters'; empty.classList.remove('hidden'); }
    else { empty.classList.add('hidden'); }
}

function resetFilters() {
    document.getElementById('searchText').value = '';
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    filterFiles();
}
</script>
</body>
</html>
